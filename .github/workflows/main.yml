name: IPTV Auto Update
on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight
  workflow_dispatch:     # Enables manual "Run workflow" button
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Critical Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests  # This will fix Exit Code 2
      - name: Run Global Aggregator
        run: python main.py
      - name: Deploy to Global Network
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AETHER-BOT"
          git add live_global.m3u
          git commit -m "Auto Update: Global Channels Sync" || exit 0
          git push
          
